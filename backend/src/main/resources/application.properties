server.port=8080
server.servlet.context-path=/api

spring.application.name=railway-interlocking-system

# WebSocket配置
websocket.endpoint=/ws/interlocking

# 日志配置
logging.level.com.railway.interlocking=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
